[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.json", "php82Extensions.bcmath", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.gd", "composer", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-reqs", "npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force; php artisan cache:clear; php artisan config:clear; frankenphp run --config /Caddyfile"